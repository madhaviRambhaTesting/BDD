[pytest]
# ============================================================================
# pytest-bdd suite configuration
# Stories  : MDP-9 | MDP-14
# Branch   : feature/bdd-checkout
# Framework: pytest-bdd + Selenium (headless Chrome by default)
#
# This is the CANONICAL pytest config file.
# Do NOT add pytest settings to setup.cfg or pyproject.toml.
# ============================================================================

testpaths =
    tests/step_definitions/checkout
    tests/step_definitions/login

addopts = -v --tb=short

markers =
    smoke:      Quick critical-path smoke tests (subset of regression)
    regression: Full regression suite after changes
    login:      Login feature tests
    checkout:   Checkout cart and order completion tests
    MDP-9:      PayStream Q2 EPIC - Functional and Integration Testing
    MDP-14:     PayStream Q2 Functional and Regression Testing Execution
    xfail:      Expected-to-fail scenarios (e.g. locked_out_user blocked at login)
