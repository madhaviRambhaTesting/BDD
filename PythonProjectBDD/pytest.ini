[pytest]
# ── pytest-bdd checkout suite ─────────────────────────────────────
# Stories  : MDP-310 | MDP-312
# Branch   : feature/bdd-checkout
# Framework: pytest-bdd + Selenium (headless Chrome by default)

testpaths =
    tests/step_definitions/checkout
    tests/step_definitions/login

addopts = -v --tb=short

markers =
    smoke: Quick critical-path smoke tests
    regression: Full regression suite
    login: Login feature tests
    checkout: Checkout feature tests
    MDP-310: Cart management BDD scenarios
    MDP-312: Order completion BDD scenarios
