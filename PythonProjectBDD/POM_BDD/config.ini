[Default]
Base_URL=https://www.saucedemo.com/
Uname=standard_user
Psed=secret_sauce

[Pytest]
markers =
    smoke: Smoke tests - Quick critical-path tests
    regression: Regression tests - Full suite after changes
    login: Tests related to login functionality
    checkout: Tests related to checkout cart and order completion
    MDP-9: PayStream Q2 EPIC - Functional and Integration Testing
    MDP-14: PayStream Q2 Functional and Regression Testing Execution
    xfail: Expected-to-fail scenarios (e.g. locked_out_user)
