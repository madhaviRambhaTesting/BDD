[Default]
Base_URL=https://www.saucedemo.com/
Uname=standard_user
Psed=secret_sauce

[Pytest]
markers =
    smoke: Smoke tests – Quick, critical-path tests
    regression: Regression tests – Full suite after changes
    login: Tests related to login functionality
    checkout: Tests related to checkout cart and order completion
    MDP-310: Cart management BDD scenarios (pytest-bdd)
    MDP-312: Order completion BDD scenarios (pytest-bdd)
testpaths =
    tests/step_definitions/checkout/checkout_cart_steps.py
    tests/step_definitions/checkout/checkout_order_steps.py
    tests/step_definitions/login/login_steps.py
addopts = -v --tb=short
