[Default]
Base_URL=https://www.saucedemo.com/
Uname=standard_user
Psed=secret_sauce

[Pytest]
markers=smoke: Smoke tests - Quick, critical path tests
        regression: Regression tests - Test entire application after changes
        login: Tests related to login functionality
        checkout: Tests related to checkout cart and order completion
        PAYSTRM-201: Cart management BDD scenarios
        PAYSTRM-202: Order completion BDD scenarios
tests = tests/test_login.py
       tests/step_definitions/checkout/checkout_cart_steps.py
       tests/step_definitions/checkout/checkout_order_steps.py-q = True
-v = True
--maxfail = 1